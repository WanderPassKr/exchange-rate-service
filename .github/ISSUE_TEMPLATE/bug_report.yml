name: "버그 리포트"
description: 예상과 다르게 작동하는 기능을 보고합니다.
title: "[BUG] "
labels: [bug]
body:
  - type: textarea
    attributes:
      label: 문제 설명
      description: 무엇이 문제인지 명확하게 설명해주세요.
    validations:
      required: true
  - type: textarea
    attributes:
      label: 재현 방법
      description: 어떻게 문제를 재현할 수 있나요?
      placeholder: |
        1. 어떤 페이지로 이동
        2. 어떤 동작 수행
        3. 오류 발생
    validations:
      required: true
  - type: input
    attributes:
      label: 🌐 환경 정보
      description: 브라우저, 운영체제 등
