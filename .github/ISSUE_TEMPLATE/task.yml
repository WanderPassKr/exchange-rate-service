name: "작업 항목"
description: 개발 또는 개선 작업에 대한 구체적인 이슈를 작성합니다.
title: "[TYPE] "
labels: [task]
body:
  - type: textarea
    attributes:
      label: 작업 설명
      description: 수행해야 할 작업에 대해 명확하게 설명해주세요.
      placeholder: |
        - 예: 외부 환율 API를 연동하여 환율 데이터를 가져와 저장한다.
    validations:
      required: true

  - type: textarea
    attributes:
      label: 작업 목적
      description: 이 작업이 필요한 이유와 기대 효과를 설명해주세요.
      placeholder: |
        - 예: 트래블카드에서 외화 결제 시 실시간 환율 적용을 가능하게 하기 위함
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: 상세 작업 내용
      description: 구체적으로 수행해야 할 작업들을 항목별로 나열해주세요.
      options:
        - label: OpenExchangeRates API를 WebClient로 호출
        - label: 트랜잭션을 적용한 환율 데이터 저장
        - label: 단건 저장을 배치 벌크 삽입으로 개선
        - label: 통화 기준으로 환율 계산 후 Redis, RDB에 저장 가능하도록 가공

  - type: textarea
    attributes:
      label: 관련 리소스
      description: 작업에 필요한 문서, 참고 링크, 의존 이슈가 있다면 작성해주세요.
      placeholder: |
        - OpenExchange API 명세: https://openexchangerates.org/
        - 관련 이슈: #12
